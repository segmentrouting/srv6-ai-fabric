name: sonic-8000

mgmt:
  network: mgt-net
  ipv4-subnet: 172.20.6.0/24
  
topology:
  nodes:

    l00:
      kind: linux
      image: c8000-clab-sonic:43
      env:
          IMAGE: /opt/cisco/images/sonic-cisco-8000.bin
          PID: '8201-32FH'
      mgmt-ipv4: 172.20.6.128

    l01:
      kind: linux
      image: c8000-clab-sonic:43
      env:
          IMAGE: /opt/cisco/images/sonic-cisco-8000.bin
          PID: '8201-32FH'
      mgmt-ipv4: 172.20.6.129

    s00:
      kind: linux
      image: c8000-clab-sonic:43
      env:
          IMAGE: /opt/cisco/images/sonic-cisco-8000.bin
          PID: '8201-32FH'
      mgmt-ipv4: 172.20.6.192

    s01:
      kind: linux
      image: c8000-clab-sonic:43
      env:
          IMAGE: /opt/cisco/images/sonic-cisco-8000.bin
          PID: '8201-32FH'
      mgmt-ipv4: 172.20.6.193

    host00:
      kind: linux
      image: iejalapeno/alpine:latest
      mgmt-ipv4: 172.20.6.224

    host08:
      kind: linux
      image: iejalapeno/alpine:latest
      mgmt-ipv4: 172.20.6.225

    br-l00-s02:
      kind: bridge

    br-l01-s02:
      kind: bridge
      
    br-l00-s03:
      kind: bridge

    br-l01-s03:
      kind: bridge
      

  links:

    - endpoints: ["l00:eth1", "s00:eth1"]
    - endpoints: ["l00:eth2", "s01:eth1"]
    - endpoints: ["l00:eth3", "br-l00-s02:l00-eth3"]
    - endpoints: ["l00:eth4", "br-l00-s03:l00-eth4"]

    - endpoints: ["l01:eth1", "s00:eth2"]
    - endpoints: ["l01:eth2", "s01:eth2"]
    - endpoints: ["l01:eth3", "br-l01-s02:l01-eth3"]
    - endpoints: ["l01:eth4", "br-l01-s03:l01-eth4"]

    - endpoints: ["l00:eth5", "host00:eth1"]
    - endpoints: ["l00:eth6", "host00:eth2"]

    - endpoints: ["l01:eth5", "host08:eth1"]
    - endpoints: ["l01:eth6", "host08:eth2"]



