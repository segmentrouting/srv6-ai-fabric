frr defaults traditional
hostname 01-superspine
fpm address 127.0.0.1
ipv6 forwarding
no fpm use-next-hop-groups
service integrated-vtysh-config
!
route-map BGP-IPV6 permit 20
set ipv6 next-hop prefer-global
exit
!
no router bgp 65100
router bgp 65000
bgp router-id 10.0.0.1
bgp log-neighbor-changes
no bgp ebgp-requires-policy
no bgp default ipv4-unicast
bgp bestpath as-path multipath-relax
neighbor 2001:db8:1:1::1 remote-as 65001
neighbor 2001:db8:1:1::3 remote-as 65001
neighbor 2001:db8:1:1::5 remote-as 65002
neighbor 2001:db8:1:1::7 remote-as 65002
!
address-family ipv6 unicast
network fc00:0:1::/48
network fc00:0:1::1/128
neighbor 2001:db8:1:1::1 activate
neighbor 2001:db8:1:1::1 route-map BGP-IPV6 in
neighbor 2001:db8:1:1::3 activate
neighbor 2001:db8:1:1::3 route-map BGP-IPV6 in
neighbor 2001:db8:1:1::5 activate
neighbor 2001:db8:1:1::5 route-map BGP-IPV6 in
neighbor 2001:db8:1:1::7 activate
neighbor 2001:db8:1:1::7 route-map BGP-IPV6 in
maximum-paths 64
exit-address-family
exit
!
segment-routing
 srv6
  encapsulation
   source-address fc00:0:1::1
  locators
   locator MAIN
    prefix fc00:0:1::/48
    format usid-f3216
   exit
   !
  exit
  !
  formats
   format usid-f3216
   exit
   !
   format uncompressed-f4024
   exit
   !
  exit
  !
 exit
 !
 srv6
  locators
   locator MAIN
   exit
   !
  exit
  !
 exit
 !
exit
!
end