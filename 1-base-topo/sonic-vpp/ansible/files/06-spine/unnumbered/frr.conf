frr defaults traditional
hostname 06-spine
fpm address 127.0.0.1
ipv6 forwarding
no fpm use-next-hop-groups
service integrated-vtysh-config
ipv6 route fc00:0:6::/48 Loopback0
!
route-map BGP-IPV6 permit 20
set ipv6 next-hop prefer-global
exit
!
no router bgp 65100
router bgp 65002
bgp router-id 10.0.0.6
bgp log-neighbor-changes
no bgp ebgp-requires-policy
no bgp default ipv4-unicast
bgp bestpath as-path multipath-relax
neighbor Ethernet0 interface remote-as 65000
neighbor Ethernet4 interface remote-as 65000
neighbor Ethernet8 interface remote-as 65013
neighbor Ethernet12 interface remote-as 65014
!
address-family ipv6 unicast
network fc00:0:6::/48
network fc00:0:6::1/128
neighbor Ethernet0 activate
neighbor Ethernet0 route-map BGP-IPV6 in
neighbor Ethernet4 activate
neighbor Ethernet4 route-map BGP-IPV6 in
neighbor Ethernet8 activate
neighbor Ethernet8 route-map BGP-IPV6 in
neighbor Ethernet12 activate
neighbor Ethernet12 route-map BGP-IPV6 in
maximum-paths 64
exit-address-family
exit
!
segment-routing
 srv6
  encapsulation
   source-address fc00:0:6::1
  locators
   locator MAIN
    prefix fc00:0:6::/48
    format usid-f3216
    opcode ::fe00:0:0:0:0 uA interface Ethernet0
    opcode ::fe04:0:0:0:0 uA interface Ethernet4
    opcode ::fe08:0:0:0:0 uA interface Ethernet8
    opcode ::fe12:0:0:0:0 uA interface Ethernet12
   exit
   !
  exit
  !
 exit
 !
exit
!
end