frr defaults traditional
hostname 10-leaf
fpm address 127.0.0.1
ipv6 forwarding
no fpm use-next-hop-groups
service integrated-vtysh-config
!
ipv6 route fc00:0:a::/48 Loopback0
!
route-map BGP-IPV6 permit 20
set ipv6 next-hop prefer-global
exit
!
vrf Vrf1
 ipv6 route fc00:0:f800:2::/64 Vrf1 segments fc00:0:6:2:4:8:fef1::
exit-vrf
!
vrf Vrf2
 ipv6 route fc00:0:f800:3::/64 Vrf2 segments fc00:0:5:2:4:8:fef2::
exit-vrf
!
no router bgp 65100
router bgp 65010
bgp router-id 10.0.0.10
bgp log-neighbor-changes
no bgp ebgp-requires-policy
no bgp default ipv4-unicast
no bgp network import-check
bgp bestpath as-path multipath-relax
neighbor 2001:db8:1:1::26 remote-as 65002
neighbor 2001:db8:1:1::30 remote-as 65002
!
address-family ipv6 unicast
network fc00:0:a::/48
network fc00:0:a::1/128
neighbor 2001:db8:1:1::26 activate
neighbor 2001:db8:1:1::26 route-map BGP-IPV6 in
neighbor 2001:db8:1:1::30 activate
neighbor 2001:db8:1:1::30 route-map BGP-IPV6 in
maximum-paths 64
exit-address-family
exit
!
segment-routing
 srv6
  encapsulation
   source-address fc00:0:a::1
  locators
   locator MAIN
    prefix fc00:0:a::/48
    format usid-f3216
    opcode ::fe00:0:0:0:0 uA interface Ethernet0
    opcode ::fe04:0:0:0:0 uA interface Ethernet4
    opcode ::fe08:0:0:0:0 uA interface Ethernet8
    opcode ::fe12:0:0:0:0 uA interface Ethernet12
    opcode ::fef1:0:0:0:0 uDT6 vrf Vrf1
    opcode ::fef2:0:0:0:0 uDT6 vrf Vrf2
   exit
   !
  exit
  !
 exit
 !
exit
!
end