name: vpp

mgmt:
  network: mgt_vpp
  ipv4-subnet: 172.20.11.0/24

topology:
  nodes:

    spine01:
      kind: sonic-vs # VXR equivalent to node/VM type (8000e, xrv9k, etc.)
      image: docker-sonic-vs:1.1
      mgmt-ipv4: 172.20.11.33

    spine02:
      kind: sonic-vs
      image: docker-sonic-vs:1.1
      mgmt-ipv4: 172.20.11.34

    spine03:
      kind: sonic-vs
      image: docker-sonic-vs:1.1
      mgmt-ipv4: 172.20.11.35

    spine04:
      kind: sonic-vs
      image: docker-sonic-vs:1.1
      mgmt-ipv4: 172.20.11.36

    leaf05:
      kind: sonic-vs
      image: docker-sonic-vs:1.1
      mgmt-ipv4: 172.20.11.65

    leaf06:
      kind: sonic-vs
      image: docker-sonic-vs:1.1
      mgmt-ipv4: 172.20.11.66

    leaf07:
      kind: sonic-vs
      image: docker-sonic-vs:1.1
      mgmt-ipv4: 172.20.11.67

    leaf08:
      kind: sonic-vs
      image: docker-sonic-vs:1.1
      mgmt-ipv4: 172.20.11.68

# Linux Hosts

    host01:
      kind: linux
      image: ubuntu-trex:1.1 # I've built an ubuntu container with trex installed and can share it if interested
      mgmt-ipv4: 172.20.8.97
      # binds: 
      #   - trex/trex01/trex_cfg.yaml:/etc/trex_cfg.yaml

    host02:
      kind: linux
      image: ubuntu-trex:1.1
      mgmt-ipv4: 172.20.8.98
      # binds: 
      #   - trex/trex02/trex_cfg.yaml:/etc/trex_cfg.yaml

    host03:
      kind: linux
      image: ubuntu-trex:1.1
      mgmt-ipv4: 172.20.8.99
      # binds: 
      #   - trex/trex01/trex_cfg.yaml:/etc/trex_cfg.yaml

    host04:
      kind: linux
      image: ubuntu-trex:1.1
      mgmt-ipv4: 172.20.8.100
      # binds: 
      #   - trex/trex02/trex_cfg.yaml:/etc/trex_cfg.yaml

  links:

  # spine01
    - endpoints: ["spine01:Gi0-0-0-0", "leaf05:Gi0-0-0-0"]
    - endpoints: ["spine01:Gi0-0-0-1", "leaf06:Gi0-0-0-0"]
    - endpoints: ["spine01:Gi0-0-0-2", "leaf07:Gi0-0-0-0"]
    - endpoints: ["spine01:Gi0-0-0-3", "leaf08:Gi0-0-0-0"]


  # spine02
    - endpoints: ["spine02:Gi0-0-0-0", "leaf05:Gi0-0-0-1"]
    - endpoints: ["spine02:Gi0-0-0-1", "leaf06:Gi0-0-0-1"]
    - endpoints: ["spine02:Gi0-0-0-2", "leaf07:Gi0-0-0-1"]
    - endpoints: ["spine02:Gi0-0-0-3", "leaf08:Gi0-0-0-1"]

  # spine03
    - endpoints: ["spine03:Gi0-0-0-0", "leaf05:Gi0-0-0-2"]
    - endpoints: ["spine03:Gi0-0-0-1", "leaf06:Gi0-0-0-2"]
    - endpoints: ["spine03:Gi0-0-0-2", "leaf07:Gi0-0-0-2"]
    - endpoints: ["spine03:Gi0-0-0-3", "leaf08:Gi0-0-0-2"]


  # spine04
    - endpoints: ["spine04:Gi0-0-0-0", "leaf05:Gi0-0-0-3"]
    - endpoints: ["spine04:Gi0-0-0-1", "leaf06:Gi0-0-0-3"]
    - endpoints: ["spine04:Gi0-0-0-2", "leaf07:Gi0-0-0-3"]
    - endpoints: ["spine04:Gi0-0-0-3", "leaf08:Gi0-0-0-3"]

  # leaf to host
    - endpoints: ["leaf05:Gi0-0-0-4", "host01:eth1"]
    - endpoints: ["leaf06:Gi0-0-0-4", "host02:eth1"]
    - endpoints: ["leaf07:Gi0-0-0-4", "host03:eth1"]
    - endpoints: ["leaf08:Gi0-0-0-4", "host04:eth1"]
