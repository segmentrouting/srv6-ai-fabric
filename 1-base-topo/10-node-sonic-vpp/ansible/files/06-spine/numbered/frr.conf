frr defaults traditional
hostname 06-spine
fpm address 127.0.0.1
ipv6 forwarding
no fpm use-next-hop-groups
service integrated-vtysh-config
!
route-map BGP-IPV6 permit 20
set ipv6 next-hop prefer-global
exit
!
no router bgp 65100
router bgp 65002
bgp router-id 10.0.0.6
bgp log-neighbor-changes
no bgp ebgp-requires-policy
no bgp default ipv4-unicast
bgp bestpath as-path multipath-relax
neighbor 2001:db8:1:1::6 remote-as 65000
neighbor 2001:db8:1:1::14 remote-as 65000
neighbor 2001:db8:1:1::29 remote-as 65000
neighbor 2001:db8:1:1::31 remote-as 65000
!
address-family ipv6 unicast
network fc00:0:6::/48
network fc00:0:6::1/128
neighbor 2001:db8:1:1::6 activate
neighbor 2001:db8:1:1::6 route-map BGP-IPV6 in
neighbor 2001:db8:1:1::14 activate
neighbor 2001:db8:1:1::14 route-map BGP-IPV6 in
neighbor 2001:db8:1:1::29 activate
neighbor 2001:db8:1:1::29 route-map BGP-IPV6 in
neighbor 2001:db8:1:1::31 activate
neighbor 2001:db8:1:1::31 route-map BGP-IPV6 in
maximum-paths 64
exit-address-family
exit
!
segment-routing
 srv6
  encapsulation
   source-address fc00:0:6::1
  locators
   locator MAIN
    prefix fc00:0:6::/48
    format usid-f3216
   exit
   !
  exit
  !
  formats
   format usid-f3216
   exit
   !
   format uncompressed-f4024
   exit
   !
  exit
  !
 exit
 !
 srv6
  locators
   locator MAIN
   exit
   !
  exit
  !
 exit
 !
exit
!
end