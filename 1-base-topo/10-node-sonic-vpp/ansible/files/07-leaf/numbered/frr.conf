frr defaults traditional
hostname 07-leaf
fpm address 127.0.0.1
ipv6 forwarding
no fpm use-next-hop-groups
service integrated-vtysh-config
!
route-map BGP-IPV6 permit 20
set ipv6 next-hop prefer-global
exit
!
vrf Vrf1
 ipv6 route fc00:0:f800:4::/64 Vrf1 segments fc00:0:3:1:5:fe01::
exit-vrf
!
no router bgp 65100
router bgp 65011
bgp router-id 10.0.0.7
bgp log-neighbor-changes
no bgp ebgp-requires-policy
no bgp default ipv4-unicast
bgp bestpath as-path multipath-relax
neighbor 2001:db8:1:1::16 interface remote-as 65001
neighbor 2001:db8:1:1::20 interface remote-as 65001
!
address-family ipv6 unicast
network fc00:0:7::/48
network fc00:0:7::1/128
neighbor 2001:db8:1:1::16 activate
neighbor 2001:db8:1:1::16 route-map BGP-IPV6 in
neighbor 2001:db8:1:1::20 activate
neighbor 2001:db8:1:1::20 route-map BGP-IPV6 in
maximum-paths 64
exit-address-family
exit
!
segment-routing
 srv6
  encapsulation
   source-address fc00:0:7::1
  locators
   locator MAIN
    prefix fc00:0:7::/48
    format usid-f3216
    opcode ::fe01:0:0:0:0 uDT6 vrf Vrf1
   exit
   !
  exit
  !
  formats
   format usid-f3216
   exit
   !
   format uncompressed-f4024
   exit
   !
  exit
  !
 exit
 !
 srv6
  locators
   locator MAIN
   exit
   !
  exit
  !
 exit
 !
exit
!
end