frr defaults traditional
hostname 10-leaf
fpm address 127.0.0.1
ipv6 forwarding
no fpm use-next-hop-groups
service integrated-vtysh-config
!
route-map BGP-IPV6 permit 20
set ipv6 next-hop prefer-global
exit
!
vrf Vrf1
 ipv6 route fc00:0:f800:2::/64 Vrf1 segments fc00:0:6:2:4:8:fe01::
exit-vrf
!
no router bgp 65100
router bgp 65010
bgp router-id 10.0.0.10
bgp log-neighbor-changes
no bgp ebgp-requires-policy
no bgp default ipv4-unicast
bgp bestpath as-path multipath-relax
neighbor 2001:db8:1:1::26 remote-as 65002
neighbor 2001:db8:1:1::30 remote-as 65002
!
address-family ipv6 unicast
network fc00:0:a::/48
network fc00:0:a::1/128
neighbor 2001:db8:1:1::26 activate
neighbor 2001:db8:1:1::26 route-map BGP-IPV6 in
neighbor 2001:db8:1:1::30 activate
neighbor 2001:db8:1:1::30 route-map BGP-IPV6 in
maximum-paths 64
exit-address-family
exit
!
segment-routing
 srv6
  encapsulation
   source-address fc00:0:a::1
  locators
   locator MAIN
    prefix fc00:0:a::/48
    format usid-f3216
    opcode ::fe01:0:0:0:0 uDT6 vrf Vrf1
   exit
   !
  exit
  !
  formats
   format usid-f3216
   exit
   !
   format uncompressed-f4024
   exit
   !
  exit
  !
 exit
 !
 srv6
  locators
   locator MAIN
   exit
   !
  exit
  !
 exit
 !
exit
!
end