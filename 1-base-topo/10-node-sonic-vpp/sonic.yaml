    01-superspine:
      kind: sonic-vm # VXR equivalent to node/VM type (8000e, xrv9k, etc.)
      #image: docker-sonic-vs:1.1
      image: vrnetlab/sonic_sonic-vs:vpp
      sysctls:
        net.ipv6.conf.all.forwarding: 1
      mgmt-ipv4: 172.20.11.11

