name: vpp

mgmt:
  network: mgt_vpp
  ipv4-subnet: 172.20.11.0/24

topology:
  nodes:

    superspine01:
      kind: sonic-vs # VXR equivalent to node/VM type (8000e, xrv9k, etc.)
      #image: docker-sonic-vs:1.1
      image: vrnetlab/sonic_sonic-vs:vpp
      mgmt-ipv4: 172.20.11.11

    superspine02:
      kind: sonic-vs
      #image: docker-sonic-vs:1.1
      image: vrnetlab/sonic_sonic-vs:vpp
      mgmt-ipv4: 172.20.11.12

    spine01:
      kind: sonic-vs 
      #image: docker-sonic-vs:1.1
      image: vrnetlab/sonic_sonic-vs:vpp
      mgmt-ipv4: 172.20.11.13

    spine02:
      kind: sonic-vs
      #image: docker-sonic-vs:1.1
      image: vrnetlab/sonic_sonic-vs:vpp
      mgmt-ipv4: 172.20.11.14

    spine03:
      kind: sonic-vs
      #image: docker-sonic-vs:1.1
      image: vrnetlab/sonic_sonic-vs:vpp
      mgmt-ipv4: 172.20.11.15

    spine04:
      kind: sonic-vs
      #image: docker-sonic-vs:1.1
      image: vrnetlab/sonic_sonic-vs:vpp
      mgmt-ipv4: 172.20.11.16

    leaf01:
      kind: sonic-vs
      #image: docker-sonic-vs:1.1
      image: vrnetlab/sonic_sonic-vs:vpp
      mgmt-ipv4: 172.20.11.17

    leaf02:
      kind: sonic-vs
      #image: docker-sonic-vs:1.1
      image: vrnetlab/sonic_sonic-vs:vpp
      mgmt-ipv4: 172.20.11.18

    leaf03:
      kind: sonic-vs
      #image: docker-sonic-vs:1.1
      image: vrnetlab/sonic_sonic-vs:vpp
      mgmt-ipv4: 172.20.11.19

    leaf04:
      kind: sonic-vs
      #image: docker-sonic-vs:1.1
      image: vrnetlab/sonic_sonic-vs:vpp
      mgmt-ipv4: 172.20.11.20

# Linux Hosts

    host01:
      kind: linux
      image: ubuntu-trex:1.1 # I've built an ubuntu container with trex installed and can share it if interested
      mgmt-ipv4: 172.20.11.21  
      # binds: 
      #   - trex/trex01/trex_cfg.yaml:/etc/trex_cfg.yaml

    host02:
      kind: linux
      image: ubuntu-trex:1.1
      mgmt-ipv4: 172.20.11.22
      # binds: 
      #   - trex/trex02/trex_cfg.yaml:/etc/trex_cfg.yaml

    host03:
      kind: linux
      image: ubuntu-trex:1.1
      mgmt-ipv4: 172.20.11.23
      # binds: 
      #   - trex/trex01/trex_cfg.yaml:/etc/trex_cfg.yaml

    host04:
      kind: linux
      image: ubuntu-trex:1.1
      mgmt-ipv4: 172.20.11.24
      # binds: 
      #   - trex/trex02/trex_cfg.yaml:/etc/trex_cfg.yaml

  links:

  
  # superspine01
    - endpoints: ["superspine01:eth1", "spine01:eth1"]
    - endpoints: ["superspine01:eth2", "spine02:eth1"]
    - endpoints: ["superspine01:eth3", "spine03:eth1"]
    - endpoints: ["superspine01:eth4", "spine04:eth1"]

  # superspine02
    - endpoints: ["superspine02:eth1", "spine01:eth2"]
    - endpoints: ["superspine02:eth2", "spine02:eth2"]
    - endpoints: ["superspine02:eth3", "spine03:eth2"]
    - endpoints: ["superspine02:eth4", "spine04:eth2"]

  # spine01
    - endpoints: ["spine01:eth3", "leaf01:eth1"]
    - endpoints: ["spine01:eth4", "leaf02:eth1"]

  # spine02
    - endpoints: ["spine02:eth3", "leaf01:eth2"]
    - endpoints: ["spine02:eth4", "leaf02:eth2"]

  # spine03
    - endpoints: ["spine03:eth3", "leaf03:eth1"]
    - endpoints: ["spine03:eth4", "leaf04:eth1"]

  # spine04
    - endpoints: ["spine04:eth3", "leaf03:eth2"]
    - endpoints: ["spine04:eth4", "leaf04:eth2"]

  # leaf to host
    - endpoints: ["leaf01:eth5", "host01:eth1"]
    - endpoints: ["leaf02:eth5", "host02:eth1"]
    - endpoints: ["leaf03:eth5", "host03:eth1"]
    - endpoints: ["leaf04:eth5", "host04:eth1"]
