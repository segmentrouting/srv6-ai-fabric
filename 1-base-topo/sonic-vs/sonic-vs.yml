    01-superspine:
      kind: sonic-vs
      image: docker-sonic-vs:1.2
      mgmt-ipv4: 172.20.12.11
      binds:
        - ansible/files/01-superspine/unnumbered/config_db.json:/usr/share/sonic/virtual_chassis/default_config.json
        - ansible/files/01-superspine/unnumbered/frr.conf:/etc/frr/frr.conf
        # - ansible/files/01-superspine/numbered/config_db.json:/usr/share/sonic/virtual_chassis/default_config.json
