  links:

  # 01-superspine
    - endpoints: ["01-superspine:eth1", "03-spine:eth1"]
    - endpoints: ["01-superspine:eth2", "04-spine:eth1"]
    - endpoints: ["01-superspine:eth3", "05-spine:eth1"]
    - endpoints: ["01-superspine:eth4", "06-spine:eth1"]

  # 02-superspine
    - endpoints: ["02-superspine:eth1", "03-spine:eth2"]
    - endpoints: ["02-superspine:eth2", "04-spine:eth2"]
    - endpoints: ["02-superspine:eth3", "05-spine:eth2"]
    - endpoints: ["02-superspine:eth4", "06-spine:eth2"]

  # 03-spine
    - endpoints: ["03-spine:eth3", "07-leaf:eth1"]
    - endpoints: ["03-spine:eth4", "08-leaf:eth1"]

  # 04-spine
    - endpoints: ["04-spine:eth3", "07-leaf:eth2"]
    - endpoints: ["04-spine:eth4", "08-leaf:eth2"]

  # 05-spine
    - endpoints: ["05-spine:eth3", "09-leaf:eth1"]
    - endpoints: ["05-spine:eth4", "10-leaf:eth1"]

  # 06-spine
    - endpoints: ["06-spine:eth3", "09-leaf:eth2"]
    - endpoints: ["06-spine:eth4", "10-leaf:eth2"]

  # leaf to host
    - endpoints: ["07-leaf:eth3", "host01:eth1"]
    - endpoints: ["07-leaf:eth4", "host02:eth1"]
    - endpoints: ["07-leaf:eth5", "host01:eth3"]

    - endpoints: ["08-leaf:eth3", "host01:eth2"]
    - endpoints: ["08-leaf:eth4", "host02:eth2"]
    - endpoints: ["08-leaf:eth5", "host02:eth3"]

    - endpoints: ["09-leaf:eth3", "host03:eth1"]
    - endpoints: ["09-leaf:eth4", "host04:eth1"]
    - endpoints: ["09-leaf:eth5", "host03:eth3"]

    - endpoints: ["10-leaf:eth3", "host03:eth2"]
    - endpoints: ["10-leaf:eth4", "host04:eth2"]
    - endpoints: ["10-leaf:eth5", "host04:eth3"]
