frr defaults traditional
hostname leaf07
fpm address 127.0.0.1
ipv6 forwarding
no fpm use-next-hop-groups
service integrated-vtysh-config
!
route-map BGP-IPV6 permit 20
set ipv6 next-hop prefer-global
exit
!
no router bgp 65100
router bgp 65013
bgp router-id 10.0.0.9
bgp log-neighbor-changes
no bgp ebgp-requires-policy
no bgp default ipv4-unicast
bgp bestpath as-path multipath-relax
neighbor Ethernet0 interface remote-as 65002
neighbor Ethernet4 interface remote-as 65002
!
address-family ipv6 unicast
network fc00:0:9::/48
network fc00:0:9::1/128
neighbor Ethernet0 activate
neighbor Ethernet0 route-map BGP-IPV6 in
neighbor Ethernet4 activate
neighbor Ethernet4 route-map BGP-IPV6 in
maximum-paths 64
exit-address-family
exit
!
segment-routing
 srv6
  encapsulation
   source-address fc00:0:9::1
  locators
   locator MAIN
    prefix fc00:0:9::/48
    format usid-f3216
   exit
   !
  exit
  !
  formats
   format usid-f3216
   exit
   !
   format uncompressed-f4024
   exit
   !
  exit
  !
 exit
 !
 srv6
  locators
   locator MAIN
   exit
   !
  exit
  !
 exit
 !
exit
!
end