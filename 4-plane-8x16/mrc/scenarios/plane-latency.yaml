# plane-latency.yaml — 10ms extra latency on plane 3 of green-host00.
#
# The headline reorder scenario. Round-robin emits packets to all 4 planes
# in lockstep; one plane lags 10ms behind. At 2kpps, that's 20 packets in
# flight on the slow plane while planes 0/1/2 are already arriving. The
# receiver should see a reorder distance histogram with a strong peak
# around 20 (and max ~= 20). Loss should be ~0%.
#
# Run:
#   python3 -m mrc.run mrc/scenarios/plane-latency.yaml --verbose

name: plane-latency
description: |
  10ms extra latency on plane 3 of green-host00's uplink. Round-robin
  spray. Expected: rx == sent, max_reorder_distance ~= 20 at 2kpps.

flows:
  - pairs:
      - { tenant: green, src: 0, dst: 15 }
    policy: round_robin
    rate: 2000pps
    duration: 6s

faults:
  - kind: netem
    target: host green-host00 plane 3
    spec: delay 10ms

report:
  out: mrc/results/plane-latency.json
