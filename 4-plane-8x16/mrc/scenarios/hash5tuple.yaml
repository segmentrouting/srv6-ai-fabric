# hash5tuple.yaml — same fabric, 5-tuple hash policy.
#
# Contrast against baseline.yaml. With only one flow per pair, the hash
# policy pins each flow to exactly one plane — so per-plane counts within
# a single flow will be 100% on one plane, 0% on the others. The point is
# to show ECMP-style behavior (no reorder, but no plane diversity either).
#
# This is what we'd expect to lose when a plane fails: the flows hashed to
# that plane are dead until ECMP rehashes (which it can't in our static lab).
#
# Run:
#   python3 -m mrc.run mrc/scenarios/hash5tuple.yaml --verbose
name: hash5tuple
description: |
  5-tuple hash spray. Each flow pins to one plane; per-flow per-plane
  counts should be {N, 0, 0, 0} for some plane.

flows:
  - pairs: green-pairs-8
    policy: hash5tuple
    rate: 1000pps
    duration: 5s

faults: []

report:
  out: mrc/results/hash5tuple.json
