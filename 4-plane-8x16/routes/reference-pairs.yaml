# reference-pairs.yaml — reproduces the original test-routes.sh `routes`
# subcommand exactly: 8 reference pairs per tenant, both directions, all
# 4 planes. Each pair is mapped to a specific spine so that across all 8
# pairs every spine in the plane is used at least once (= demo coverage).
#
# Apply with:
#   ./routes.py apply -f routes/reference-pairs.yaml
#
# This installs 8 pairs * 2 tenants * 8 routes/pair = 128 routes total.
apiVersion: srv6-lab/v1
kind: RouteSet
metadata:
  name: reference-pairs
spec:
  pairs:
    # green tenant
    - {tenant: green, src: 0, dst: 15}   # spine auto -> 0 (PAIRS table)
    - {tenant: green, src: 1, dst: 14}   # spine auto -> 2
    - {tenant: green, src: 2, dst: 13}   # spine auto -> 4
    - {tenant: green, src: 3, dst: 12}   # spine auto -> 6
    - {tenant: green, src: 4, dst: 11}   # spine auto -> 1
    - {tenant: green, src: 5, dst: 10}   # spine auto -> 3
    - {tenant: green, src: 6, dst: 9}    # spine auto -> 5
    - {tenant: green, src: 7, dst: 8}    # spine auto -> 7
    # yellow tenant
    - {tenant: yellow, src: 0, dst: 15}
    - {tenant: yellow, src: 1, dst: 14}
    - {tenant: yellow, src: 2, dst: 13}
    - {tenant: yellow, src: 3, dst: 12}
    - {tenant: yellow, src: 4, dst: 11}
    - {tenant: yellow, src: 5, dst: 10}
    - {tenant: yellow, src: 6, dst: 9}
    - {tenant: yellow, src: 7, dst: 8}
