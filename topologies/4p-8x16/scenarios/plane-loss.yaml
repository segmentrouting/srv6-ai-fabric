# plane-loss.yaml — 5% random drop on plane 2's link from green-host00.
#
# Demonstrates the per-flow per-plane loss attribution from the receiver's
# stats: with round-robin, ~25% of packets go via plane 2, and ~5% of those
# drop, so total loss on the affected flow is ~1.25%. The reorder histogram
# should also widen modestly because the late-detect-then-recover pattern
# on plane 2 creates small reorder windows.
#
# Run:
#   python3 -m mrc.run mrc/scenarios/plane-loss.yaml --verbose

name: plane-loss
description: |
  Inject 5% random loss on plane 2 of green-host00's uplink. Round-robin
  spray. Compare loss% and reorder distribution against baseline.yaml.

flows:
  - pairs:
      - { tenant: green, src: 0, dst: 15 }
    policy: round_robin
    rate: 2000pps
    duration: 8s

faults:
  - kind: netem
    target: host green-host00 plane 2
    spec: loss 5%

report:
  out: results/plane-loss.json
