# yellow-mrc-plane-latency.yaml — 10ms latency on plane 3,
# health_aware_mrc, yellow tenant.
#
# Yellow counterpart to green-mrc-plane-latency.yaml. Same design
# question: does the EV state machine react to latency alone? Same
# answer: it does not, by current design. MRC consumes loss + probe
# loss; pure latency leaves loss windows clean and probe replies
# arrive (slower, but successfully), so all planes stay GOOD.
#
# This scenario exists to:
#   1. Confirm the yellow data path produces equivalent latency
#      behavior to green under the same netem rule (sanity check that
#      host-side End.DT6 decap doesn't introduce its own timing
#      asymmetries that would mask the injected delay).
#   2. Serve as a regression fixture alongside green-mrc-plane-latency
#      for when RTT-aware MRC weighting lands — at that point this
#      scenario should start showing per-plane weight shifts away from
#      plane 3 even with zero loss.
#
# Expected today: all 4 planes in state=good at weight=0.25; plane 3
# shows elevated rtt_p50/p99 in the EV-state snapshot but no demotion;
# per-plane sent uniform; reorder histogram tail shifted by ~10ms-worth
# of in-flight packets per plane.
#
# Prerequisites:
#   make host-routes   # installs per-NIC End.DT6 policies on yellow hosts
#
# Run:
#   make scenario SCEN=yellow-mrc-plane-latency

name: yellow-mrc-plane-latency
description: |
  10ms extra latency on plane 3 of yellow-host00's uplink, health_aware_mrc
  spray. Current MRC build reacts to loss + probe loss, not RTT, so we
  expect uniform per-plane spray, all planes GOOD, and elevated plane-3
  RTT visible in the EV-state diagnostics. Yellow counterpart to
  green-mrc-plane-latency; reserved as a regression fixture for future
  RTT-aware weighting.

flows:
  - pairs:
      - { tenant: yellow, src: 0, dst: 15 }
    policy: health_aware_mrc
    rate: 2000pps
    duration: 6s

faults:
  - kind: netem
    target: host yellow-host00 plane 3
    spec: delay 10ms

mrc: {}

report:
  out: results/yellow-mrc-plane-latency.json
