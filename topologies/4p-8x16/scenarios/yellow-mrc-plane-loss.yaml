# yellow-mrc-plane-loss.yaml — 5% loss on plane 2, health_aware_mrc,
# yellow tenant.
#
# Yellow counterpart to green-mrc-plane-loss.yaml. Same headline MRC
# behavior — sender detects loss via receiver LossReports, demotes the
# affected plane, spray weights shift away — but on the yellow data
# path (per-plane underlay + host-side End.DT6 decap).
#
# This scenario isolates a tenant-model difference that could plausibly
# matter for MRC: yellow's per-plane underlay addresses mean the
# probe/report return path uses different source/destination
# addresses than green's anycast model. If anything in the agent
# accidentally depended on the green addressing (e.g. assumed the
# receiver's source addr would be plane-independent), it would show up
# here as a probe-timeout or report-mismatch signal that green
# scenarios wouldn't catch.
#
# Mechanism: identical to green-mrc-plane-loss — receiver's loss-window
# thread observes ~5% loss on plane 2, sends LossReport; sender's
# EVStateTable demotes plane 2 (UNKNOWN → ASSUMED_BAD once
# loss_demote_consecutive windows exceed loss_threshold); spray
# weights shift to planes 0/1/3.
#
# Tighter knobs vs defaults (matching green-mrc-plane-loss): shorter
# loss_window_ms and lower loss_demote_consecutive so the demotion is
# observable inside the 8s run.
#
# Expected: plane 2 in state=assumed_bad with weight=0; planes 0/1/3
# in state=good carrying load uniformly at weight=1/3 each; total loss
# << the round-robin reference (plane-loss.yaml, yellow analog would
# be ~1.25%).
#
# Prerequisites:
#   make host-routes   # installs per-NIC End.DT6 policies on yellow hosts
#
# Run:
#   make scenario SCEN=yellow-mrc-plane-loss

name: yellow-mrc-plane-loss
description: |
  Inject 5% random loss on plane 2 of yellow-host00's uplink, then spray
  with health_aware_mrc. The MRC agents should detect the loss within a
  second or two and shift traffic to planes 0/1/3, lowering total loss
  well below the round_robin reference. Exercises the yellow data path
  (per-plane underlay + host-side End.DT6 decap) under the same fault
  pattern that green-mrc-plane-loss exercises on the green data path.

flows:
  - pairs:
      - { tenant: yellow, src: 0, dst: 15 }
    policy: health_aware_mrc
    rate: 2000pps
    duration: 8s

faults:
  - kind: netem
    target: host yellow-host00 plane 2
    spec: loss 5%

mrc:
  # Shorter windows + lower demote-consecutive: we want a visible
  # demotion inside the 8s run. Production defaults (200ms/2) would
  # also work but leave less of the run on the post-demotion regime.
  loss_window_ms: 100
  loss_demote_consecutive: 2

report:
  out: results/yellow-mrc-plane-loss.json
