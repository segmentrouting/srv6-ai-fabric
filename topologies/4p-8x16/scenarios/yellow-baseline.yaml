# yellow-baseline.yaml — clean fabric, round-robin spray across 4 planes,
# yellow tenant.
#
# Counterpart to baseline.yaml (green). Yellow exercises a meaningfully
# different data path: the destination has no anycast NIC address;
# instead the tenant identity lives on `lo` as 2001:db8:cccd:<NN>::2/128,
# and decap happens on the destination *host* via a per-NIC
# `seg6local End.DT6 table 0` policy (installed by `make host-routes`).
# The SID list emitted by the sender therefore has one extra segment
# compared to green (the host-decap SID `...:d001::`).
#
# Prerequisites:
#   make host-routes   # installs the per-NIC End.DT6 policies on yellow hosts
#
# Run:
#   make scenario SCEN=yellow-baseline
#
# Expected: behavior comparable to green baseline -- near-zero loss,
# balanced per-plane counts. Reorder may differ slightly because the
# extra decap stage runs in software on each yellow host (not in
# kernel-fastpath through Vrf-green's connected route as in green).
name: yellow-baseline
description: |
  All 4 planes healthy, round-robin spray over 8 well-known leaf pairs,
  yellow tenant (host-side seg6local End.DT6 decap). Sanity check that
  the fabric, sprayer, receiver, and per-NIC End.DT6 policies all agree
  on the yellow wire format.

flows:
  - pairs: yellow-pairs-8
    policy: round_robin
    rate: 1000pps
    duration: 5s

faults: []

report:
  out: results/yellow-baseline.json
