# green-mrc-plane-loss.yaml — 5% loss on plane 2, health_aware_mrc spray.
#
# This is the headline MRC scenario. Mirror of plane-loss.yaml but with
# the spray policy switched to health_aware_mrc, so we can compare:
#
#   plane-loss.yaml         (round_robin)        ~1.25% total loss
#   green-mrc-plane-loss    (health_aware_mrc)   << 1.25% total loss
#
# Mechanism: the receiver's loss-window thread observes ~5% loss on
# plane 2, sends LossReport frames back to the sender; the sender's
# EVStateTable demotes plane 2 (UNKNOWN → ASSUMED_BAD once
# loss_demote_consecutive windows in a row exceed loss_threshold). The
# spray weights then shift away from plane 2 to the remaining three
# healthy planes, dropping the effective loss rate.
#
# Tighter knobs vs defaults: shorter loss_window_ms and lower
# loss_demote_consecutive so the demotion happens well within the 8s
# scenario duration. Defaults are tuned for steadier production
# workloads where you don't want to demote on a single noisy window.
#
# Run:
#   python3 -m srv6_fabric.mrc.run \
#       topologies/4p-8x16/scenarios/green-mrc-plane-loss.yaml --verbose

name: green-mrc-plane-loss
description: |
  Inject 5% random loss on plane 2 of green-host00's uplink, then spray
  with health_aware_mrc. The MRC agents should detect the loss within a
  second or two and shift traffic to planes 0/1/3, lowering total loss
  well below the round_robin reference (plane-loss.yaml).

flows:
  - pairs:
      - { tenant: green, src: 0, dst: 15 }
    policy: health_aware_mrc
    rate: 2000pps
    duration: 8s

faults:
  - kind: netem
    target: host green-host00 plane 2
    spec: loss 5%

mrc:
  # Shorter windows + lower demote-consecutive: we want a visible
  # demotion inside the 8s run. Production defaults (200ms/2) would
  # also work but leave less of the run on the post-demotion regime.
  loss_window_ms: 100
  loss_demote_consecutive: 2

report:
  out: results/green-mrc-plane-loss.json
