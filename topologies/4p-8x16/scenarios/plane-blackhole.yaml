# plane-blackhole.yaml — drop everything on plane 1 of green-host00.
#
# The strong-failure case. Round-robin sends 25% of packets into a black
# hole; the receiver should see exactly ~75% rx and ~25% loss, with per-
# plane-rx counts {N, 0, N, N}. This is the scenario where a health-aware
# policy would shine: with health detection wired in, the sender would skip
# plane 1 entirely after the first K failed probes, dropping loss to ~0%.
#
# We don't yet have orchestrator-driven health probing wired to the spray.py
# CLI (see policy_to_cli in mrc/run.py — NotImplementedError on health_aware).
# When that lands, swap policy to `{ health_aware: round_robin }` here and
# observe the recovery effect.
#
# Run:
#   python3 -m mrc.run mrc/scenarios/plane-blackhole.yaml --verbose

name: plane-blackhole
description: |
  Drop 100% of packets on green-host00's plane 1 uplink. Round-robin
  spray. Expected: rx == ~75% of sent, plane 1 rx == 0.

flows:
  - pairs:
      - { tenant: green, src: 0, dst: 15 }
    policy: round_robin
    rate: 2000pps
    duration: 6s

faults:
  - kind: netem
    target: host green-host00 plane 1
    spec: blackhole          # sugar for `loss 100%` (see lib/netem.normalize_spec)

report:
  out: results/plane-blackhole.json
