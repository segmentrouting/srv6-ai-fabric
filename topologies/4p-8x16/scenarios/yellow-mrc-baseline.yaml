# yellow-mrc-baseline.yaml — clean fabric, health_aware_mrc spray,
# yellow tenant.
#
# Yellow counterpart to green-mrc-baseline.yaml. Same MRC-on-clean-fabric
# sanity check, on the yellow data path. Post-Phase-1a, the yellow inner
# anycast (cccc:<NN>::2) and host-side seg6local End.DT6 decap together
# mean inner packets are delivered to the host loopback rather than to
# the per-plane NIC; this scenario is the lab path that exercises that
# decap geometry under MRC.
#
# What this verifies above and beyond green-mrc-baseline:
#   * The receiver MRC agent's collapsed rx socket (Phase 1a step 3,
#     bound to (::, SPRAY_PROBE_PORT) with no SO_BINDTODEVICE) actually
#     receives probes that arrive via the host's seg6local End.DT6 decap
#     onto lo. A NIC-bound rx socket would silently miss them; this
#     scenario fails fast if the collapse regressed.
#   * Plane attribution (which the receiver derives from probe payload
#     `plane_id` rather than ingress NIC under the collapsed model)
#     produces the same uniform-spray steady state as green's leaf-decap
#     path.
#
# Expected: per-plane sent within a few percent of uniform, ~0% loss,
# all 4 planes in `state=good` weight=0.25 in the EV-state snapshot.
#
# Prerequisites:
#   make host-routes   # installs host-side End.DT6 policies on yellow hosts
#
# Run:
#   make scenario SCEN=yellow-mrc-baseline

name: yellow-mrc-baseline
description: |
  All 4 planes healthy, health_aware_mrc spray over 8 yellow leaf pairs.
  Yellow data path uses inner anycast cccc:<NN>::2 + host-side End.DT6
  decap onto lo. Sanity check that enabling MRC is a no-op on a clean
  fabric for the yellow tenant, and that the Phase 1a step 3 collapsed
  rx socket sees probes arriving via the host-side decap.

flows:
  - pairs: yellow-pairs-8
    policy: health_aware_mrc
    rate: 1000pps
    duration: 5s

faults: []

# Enable MRC with defaults — presence of the block (even empty) is what
# flips the orchestrator to pass --mrc on receivers and to set
# SRV6_MRC_CONFIG_JSON on senders.
mrc: {}

report:
  out: results/yellow-mrc-baseline.json
