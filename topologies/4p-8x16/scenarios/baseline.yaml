# baseline.yaml — clean fabric, round-robin spray across 4 planes.
#
# This is the reference point every other scenario is compared against.
# We expect near-zero loss, balanced per-plane counts, and minimal reorder
# (the only sources of reorder here are CPU scheduling jitter and the
# fabric's own queueing — both very small at 1kpps).
#
# Run:
#   python3 -m mrc.run mrc/scenarios/baseline.yaml --verbose
name: baseline
description: |
  All 4 planes healthy, round-robin spray over 8 well-known leaf pairs.
  Sanity check that the fabric, the sprayer, and the receiver agree on
  the wire format.

flows:
  - pairs: green-pairs-8
    policy: round_robin
    rate: 1000pps
    duration: 5s

faults: []

report:
  out: results/baseline.json
