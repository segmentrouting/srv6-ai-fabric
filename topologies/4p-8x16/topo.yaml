# topo.yaml — declarative parameters for this topology.
#
# This is the single source of truth. The generator reads it to emit
# topology.clab.yaml + config/. The runtime srv6_fabric package reads
# it (via SRV6_TOPO env var, defaulting to this file) to learn the
# fabric dimensions.
#
# For the design rationale and addressing scheme, see
# docs/topologies/4p-8x16.md.

name: 4p-8x16
description: 4-plane Clos, 8 spines per plane, 16 leaves per plane

# Fabric dimensions
planes: 4
spines_per_plane: 8
leaves_per_plane: 16

# Tenants. The address blocks and SID function bits live in
# srv6_fabric.topo for now (one set of constants for all current
# tenants); listed here only for documentation. Future multi-tenant
# topologies will move these into a tenants: dict consumed by the
# generator and runtime.
tenants:
  - green
  - yellow

# Container images. The generator writes these as `image:` fields in
# topology.clab.yaml.
images:
  sonic: docker-sonic-vs:latest
  host: alpine-srv6-scapy:1.0

# Containerlab
clab:
  topology_name: sonic-docker-4p-8x16
