# baseline.yaml — clean fabric, round-robin spray across 2 planes.
#
# This is the reference point every other scenario for 2p-4x8 is compared
# against. Expect near-zero loss, balanced per-plane counts, and minimal
# reorder.
#
# Run:
#   make TOPO=2p-4x8 scenario SCEN=baseline
name: baseline
description: |
  Both planes healthy, round-robin spray over 4 well-known leaf pairs.
  Sanity check that the fabric, the sprayer, and the receiver agree on
  the wire format on the smaller 2p-4x8 topology.

flows:
  - pairs: green-pairs-4
    policy: round_robin
    rate: 1000pps
    duration: 5s

faults: []

report:
  out: results/baseline.json
