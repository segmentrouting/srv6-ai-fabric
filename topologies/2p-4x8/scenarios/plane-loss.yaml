# plane-loss.yaml — 5% random drop on plane 1's link from green-host00.
#
# With round-robin across 2 planes, ~50% of packets go via plane 1, and
# ~5% of those drop, so total loss on the affected flow is ~2.5%.
#
# Run:
#   make TOPO=2p-4x8 scenario SCEN=plane-loss

name: plane-loss
description: |
  Inject 5% random loss on plane 1 of green-host00's uplink. Round-robin
  spray. Compare loss% and reorder distribution against baseline.yaml.

flows:
  - pairs:
      - { tenant: green, src: 0, dst: 7 }
    policy: round_robin
    rate: 2000pps
    duration: 8s

faults:
  - kind: netem
    target: host green-host00 plane 1
    spec: loss 5%

report:
  out: results/plane-loss.json
