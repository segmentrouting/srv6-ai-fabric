frr defaults traditional
hostname 02-superspine
fpm address 127.0.0.1
ipv6 forwarding
no fpm use-next-hop-groups
service integrated-vtysh-config
ipv6 route fc00:0:2::/48 Loopback0
!
route-map BGP-IPV6 permit 20
set ipv6 next-hop prefer-global
exit
!
no router bgp 65100
router bgp 65000
bgp router-id 10.0.0.2
bgp log-neighbor-changes
no bgp ebgp-requires-policy
no bgp default ipv4-unicast
no bgp network import-check
bgp bestpath as-path multipath-relax
neighbor 2001:db8:1:1::9 remote-as 65001
neighbor 2001:db8:1:1::11 remote-as 65001
neighbor 2001:db8:1:1::13 remote-as 65002
neighbor 2001:db8:1:1::15 remote-as 65002
!
address-family ipv6 unicast
network fc00:0:2::/48
network fc00:0:2::1/128
neighbor 2001:db8:1:1::9 activate
neighbor 2001:db8:1:1::9 route-map BGP-IPV6 in
neighbor 2001:db8:1:1::11 activate
neighbor 2001:db8:1:1::11 route-map BGP-IPV6 in
neighbor 2001:db8:1:1::13 activate
neighbor 2001:db8:1:1::13 route-map BGP-IPV6 in
neighbor 2001:db8:1:1::15 activate
neighbor 2001:db8:1:1::15 route-map BGP-IPV6 in
maximum-paths 64
exit-address-family
exit
!
segment-routing
 srv6
  encapsulation
   source-address fc00:0:2::1
  locators
   locator MAIN
    prefix fc00:0:2::/48
    format usid-f3216
    opcode ::fe00:0:0:0:0 uA interface Ethernet0
    opcode ::fe04:0:0:0:0 uA interface Ethernet4
    opcode ::fe08:0:0:0:0 uA interface Ethernet8
    opcode ::fe12:0:0:0:0 uA interface Ethernet12
   exit
   !
  exit
  !
 exit
 !
exit
!
end