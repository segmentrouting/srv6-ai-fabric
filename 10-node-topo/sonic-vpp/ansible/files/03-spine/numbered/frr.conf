frr defaults traditional
hostname 03-spine
fpm address 127.0.0.1
ipv6 forwarding
no fpm use-next-hop-groups
service integrated-vtysh-config
ipv6 route fc00:0:3::/48 Loopback0
!
route-map BGP-IPV6 permit 20
set ipv6 next-hop prefer-global
exit
!
no router bgp 65100
router bgp 65001
bgp router-id 10.0.0.3
bgp log-neighbor-changes
no bgp ebgp-requires-policy
no bgp default ipv4-unicast
no bgp network import-check
bgp bestpath as-path multipath-relax
neighbor 2001:db8:1:1:: remote-as 65000
neighbor 2001:db8:1:1::8 remote-as 65000
neighbor 2001:db8:1:1::17 remote-as 65007
neighbor 2001:db8:1:1::19 remote-as 65008
!
address-family ipv6 unicast
network fc00:0:3::/48
network fc00:0:3::1/128
neighbor 2001:db8:1:1:: activate
neighbor 2001:db8:1:1:: route-map BGP-IPV6 in
neighbor 2001:db8:1:1::8 activate
neighbor 2001:db8:1:1::8 route-map BGP-IPV6 in
neighbor 2001:db8:1:1::17 activate
neighbor 2001:db8:1:1::17 route-map BGP-IPV6 in
neighbor 2001:db8:1:1::19 activate
neighbor 2001:db8:1:1::19 route-map BGP-IPV6 in
maximum-paths 64
exit-address-family
exit
!
segment-routing
 srv6
  encapsulation
   source-address fc00:0:3::1
  locators
   locator MAIN
    prefix fc00:0:3::/48
    format usid-f3216
    opcode ::fe00:0:0:0:0 uA interface Ethernet0
    opcode ::fe04:0:0:0:0 uA interface Ethernet4
    opcode ::fe08:0:0:0:0 uA interface Ethernet8
    opcode ::fe12:0:0:0:0 uA interface Ethernet12
   exit
   !
  exit
  !
 exit
 !
exit
!
end