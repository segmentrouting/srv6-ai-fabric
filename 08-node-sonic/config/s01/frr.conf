frr defaults traditional
hostname spine01
log syslog informational
log facility local4
agentx
no service integrated-vtysh-config
!
password zebra
enable password zebra
!
ipv6 route fc00:0:1001::/48 Loopback0
!
router bgp 65001
 bgp router-id 10.0.0.1
 bgp log-neighbor-changes
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 bgp bestpath as-path multipath-relax
 neighbor Ethernet0 interface remote-as 65200
 neighbor Ethernet8 interface remote-as 65201
 neighbor Ethernet16 interface remote-as 65202
 neighbor Ethernet24 interface remote-as 65203
 !
 segment-routing srv6
  locator MAIN
 exit
 !
 address-family ipv4 unicast
  network 10.0.0.1/32
 !
 address-family ipv6 unicast
  network fc00:0:1001::/48
  network fc00:0:1001::1/128
  neighbor Ethernet0 activate
  neighbor Ethernet0 route-map BGP-IPV6 in
  neighbor Ethernet8 activate
  neighbor Ethernet8 route-map BGP-IPV6 in
  neighbor Ethernet16 activate
  neighbor Ethernet16 route-map BGP-IPV6 in
  neighbor Ethernet24 activate
  neighbor Ethernet24 route-map BGP-IPV6 in
  maximum-paths 64
 exit-address-family
 !
exit
!
route-map BGP-IPV6 permit 20
 set ipv6 next-hop prefer-global
exit
!
ip nht resolve-via-default
!
segment-routing
 srv6
  encapsulation
   source-address fc00:0:1001::1
  locators
   locator MAIN
    prefix fc00:0:1001::/48 block-len 24 node-len 24 func-bits 16
    format usid-f3216
   exit
   !
  exit
  !
  formats
   format usid-f3216
   exit
   !
   format uncompressed-f4024
   exit
   !
  exit
  !
 exit
 !
exit
!
end
