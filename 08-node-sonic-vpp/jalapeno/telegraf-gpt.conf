[[inputs.gnmi]]
  ## Addresses of SONiC nodes
  addresses = [
    "clab-sonic-l00:8080",
    "clab-sonic-l01:8080",
    "clab-sonic-l02:8080"
  ]

  ## Credentials (assumes same user/pass on all SONiC nodes)
  username = "admin"
  password = "admin"

  ## Skip TLS for now
  insecure = true

  ## Subscription mode can be "sample", "on_change", or "target_defined"
  subscription_mode = "sample"
  sample_interval = "10s"

  ## Encoding (SONiC usually supports "json" or "proto")
  encoding = "json"

  ## Optional: set a name for the target if you want it in tags
  target = "sonic"

  ## List of OpenConfig paths you want to monitor
  paths = [
    "/openconfig-network-instance:network-instances/network-instance[name=default]/protocols/protocol[identifier=BGP][name=BGP]/bgp/neighbors/neighbor/state",
    "/openconfig-network-instance:network-instances/network-instance[name=default]/protocols/protocol[identifier=BGP][name=BGP]/bgp/global/state"
  ]

  ## Optional tags to help organize data
  [inputs.gnmi.tags]
    source = "sonic"

