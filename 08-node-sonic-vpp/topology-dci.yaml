name: sonic

mgmt:
  network: mgt-net
  ipv4-subnet: 172.20.6.0/24
  
topology:
  nodes:

    l00:
      kind: linux
      image: vrnetlab/sonic_sonic-vs:vpp20250422
      mgmt-ipv4: 172.20.6.128

    l01:
      kind: linux
      image: vrnetlab/sonic_sonic-vs:vpp20250422
      mgmt-ipv4: 172.20.6.129

    l02:
      kind: linux
      image: vrnetlab/sonic_sonic-vs:vpp20250422
      mgmt-ipv4: 172.20.6.130

    l03:
      kind: linux
      image: vrnetlab/sonic_sonic-vs:vpp20250422
      mgmt-ipv4: 172.20.6.131

    s00:
      kind: linux
      image: vrnetlab/sonic_sonic-vs:vpp20250422
      mgmt-ipv4: 172.20.6.192

    s01:
      kind: linux
      image: vrnetlab/sonic_sonic-vs:vpp20250422
      mgmt-ipv4: 172.20.6.193

    s02:
      kind: linux
      image: vrnetlab/sonic_sonic-vs:vpp20250422
      mgmt-ipv4: 172.20.6.194

    s03:
      kind: linux
      image: vrnetlab/sonic_sonic-vs:vpp20250422
      mgmt-ipv4: 172.20.6.195

    dci00:
      kind: cisco_xrd
      image: ios-xr/xrd-control-plane:24.4.1
      startup-config: xrd-config/dci00.cfg
      mgmt-ipv4: 172.20.6.200

    dci01:
      kind: cisco_xrd
      image: ios-xr/xrd-control-plane:24.4.1
      startup-config: xrd-config/dci01.cfg
      mgmt-ipv4: 172.20.6.201

    host00:
      kind: linux
      image: ubuntu-trex:1.4
      mgmt-ipv4: 172.20.6.224

    host08:
      kind: linux
      image: ubuntu-trex:1.4
      mgmt-ipv4: 172.20.6.225

    host16:
      kind: linux
      image: ubuntu-trex:1.4
      mgmt-ipv4: 172.20.6.226

    host24:
      kind: linux
      image: ubuntu-trex:1.4
      mgmt-ipv4: 172.20.6.227

    l00-bridge:
      kind: bridge

    l01-bridge:
      kind: bridge

    l02-bridge:
      kind: bridge

    l03-bridge:
      kind: bridge

  links:

    - endpoints: ["l00:eth1", "s00:eth1"]
    - endpoints: ["l00:eth2", "s01:eth1"]
    - endpoints: ["l00:eth3", "s02:eth1"]
    - endpoints: ["l00:eth4", "s03:eth1"]

    - endpoints: ["l01:eth1", "s00:eth2"]
    - endpoints: ["l01:eth2", "s01:eth2"]
    - endpoints: ["l01:eth3", "s02:eth2"]
    - endpoints: ["l01:eth4", "s03:eth2"]

    - endpoints: ["l02:eth1", "s00:eth3"]
    - endpoints: ["l02:eth2", "s01:eth3"]
    - endpoints: ["l02:eth3", "s02:eth3"]
    - endpoints: ["l02:eth4", "s03:eth3"]

    - endpoints: ["l03:eth1", "s00:eth4"]
    - endpoints: ["l03:eth2", "s01:eth4"]
    - endpoints: ["l03:eth3", "s02:eth4"]
    - endpoints: ["l03:eth4", "s03:eth4"]

    - endpoints: ["l00:eth5", "host00:eth1"]
    - endpoints: ["l00:eth6", "host00:eth2"]
    - endpoints: ["l00:eth7", "l00-bridge:l00-eth7"]
 

    - endpoints: ["l01:eth5", "host08:eth1"]
    - endpoints: ["l01:eth6", "host08:eth2"]
    - endpoints: ["l01:eth7", "l01-bridge:l01-eth7"]

    - endpoints: ["l02:eth5", "host16:eth1"]  
    - endpoints: ["l02:eth6", "host16:eth2"]
    - endpoints: ["l02:eth7", "l02-bridge:l02-eth7"]

    - endpoints: ["l03:eth5", "host24:eth1"]
    - endpoints: ["l03:eth6", "host24:eth2"]
    - endpoints: ["l03:eth7", "l03-bridge:l03-eth7"]

    - endpoints: ["dci00:Gi0-0-0-0", "s00:eth5"]
    - endpoints: ["dci00:Gi0-0-0-1", "s01:eth5"]
    - endpoints: ["dci00:Gi0-0-0-2", "s02:eth5"]
    - endpoints: ["dci00:Gi0-0-0-3", "s03:eth5"]

    - endpoints: ["dci01:Gi0-0-0-0", "s00:eth6"]
    - endpoints: ["dci01:Gi0-0-0-1", "s01:eth6"]
    - endpoints: ["dci01:Gi0-0-0-2", "s02:eth6"]
    - endpoints: ["dci01:Gi0-0-0-3", "s03:eth6"]
    
