hostname dci01
!
username cisco
 group root-lr
 group cisco-support
 secret 10 $6$GXFSDMYr1txD....$09ETAo1VMaFVXEu9HMDuV9y8fpXbZIHhgWe8nqvxotAaOOaTCxsC8QBzp3g1aVHFZUOtPuLFeLOaL.XsIpQHw.
!
interface Loopback0
 ipv4 address 10.0.0.201 255.255.255.255
 ipv6 address fc00:0:2001::1/128
!
interface MgmtEth0/RP0/CPU0/0
 description mgt
 ipv4 address 172.20.7.201 255.255.255.0
!
interface GigabitEthernet0/0/0/0
 description to s00
 ipv6 address 2001:db8:1:1:0::2/127
!
interface GigabitEthernet0/0/0/1
 description to s01
 ipv6 address 2001:db8:1:1:0::6/127
!
interface GigabitEthernet0/0/0/2
 description to s02
 ipv6 address 2001:db8:1:1:0::10/127
!
interface GigabitEthernet0/0/0/3
 description to s03
 ipv6 address 2001:db8:1:1:0::14/127
!
route-policy drop
  drop
end-policy
!
route-policy pass
  pass
end-policy
!  
route-policy SUPPRESS_RIB_INSTALL
  set rib-install false
end-policy
!       
router static
 address-family ipv4 unicast
  0.0.0.0/0 172.20.7.1
 !
!
router bgp 64512
 bgp router-id 10.0.0.201
 bgp bestpath as-path multipath-relax
 address-family ipv6 unicast
  additional-paths receive
  maximum-paths ebgp 32
  segment-routing srv6
   locator MAIN
  !
  network fc00:0:2001::/48
  network fc00:0:2001::1/128
 !
 neighbor-group v6-underlay
  send-extended-community-ebgp
  address-family ipv4 unicast
   route-policy pass in
   route-policy pass out
  ! 
  address-family ipv6 unicast
   route-policy pass in
   route-policy pass out
  !
 !
 neighbor 2001:db8:1:1::3
  remote-as 65000
  use neighbor-group v6-underlay
 !
 neighbor 2001:db8:1:1::7
  remote-as 65001
  use neighbor-group v6-underlay
 !
 neighbor 2001:db8:1:1::11
  remote-as 65002
  use neighbor-group v6-underlay
 !
 neighbor 2001:db8:1:1::15
  remote-as 65003
  use neighbor-group v6-underlay
!
segment-routing
 srv6
  encapsulation
   source-address fc00:0:2001::1
  !
  locators
   locator MAIN
    micro-segment behavior unode psp-usd
    prefix fc00:0:2001::/48
   !
  !
 !
!
ssh server rate-limit 600
ssh server session-limit 100
ssh server v2
ssh server vrf default
ssh server netconf vrf default