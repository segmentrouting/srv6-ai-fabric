---

# ansible-playbook -i hosts deploy-playbook.yaml -e "ansible_user=cisco ansible_ssh_pass=cisco123 ansible_sudo_pass=cisco123" -vv

- name: Apply config_db.json and frr.conf to SONiC routers
  hosts: localhost
  become: true
  tasks:

    - name: run add-br.sh
      command: "./add-br.sh"
      ignore_errors: yes

    - name: deploy clab topology
      command: "clab deploy -t ../topology-vpp.yaml"
      ignore_errors: yes

    - name: ssh-keygen
      command: "./ssh-keygen.sh"
      ignore_errors: yes
